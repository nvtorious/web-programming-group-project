<main>
    <section class="user-section">
        <div class="user-card">
            <h2>Register</h2>

            <form id="register-form">
            <div class="form-group"> 
                <label for="firstname">First Name</label>
                <input type="text" id="firstname" placeholder="Enter your First Name">
                <span class="error-msg" id="user-fname-error">First Name is required</span>
            </div>

         <div class="form-group">
                <label for="lastname">Last Name</label>
                <input type="text" id="lastname" placeholder="And your Last Name">
                <span class="error-msg" id="user-lname-error">Last Name is required</span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your Email">
                <span class="error-msg" id="user-email-error">Email is required</span>
            </div>


            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" placeholder="Enter your Birth Date ">
                <span class="error-msg" id="user-dob-error">D.O.B is required</span>
            </div>


             <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Create a Username for this site ">
                <span class="error-msg" id="username-error">A Username is required</span>
            </div>


             <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Create a Password to login into your account ">
                <span class="error-msg" id="user-password-error">A Password is required</span>
            </div>


            
             <div class="form-group">
                <label for="reg-cpassword">Confirm Password</label>
                <input type="password" id="reg-cpassword" placeholder="Re-enter your created password to confirm ">
                <span class="error-msg" id="user-cpassword-error">Passwords must match</span>
                
            </div>

            <button class="btn" id="registerbtn">Register</button>
          <p>Already have an account? <a href="login.html">Log-in here</a></p>
            </form>


            
        </div>
    </section>
</main>
