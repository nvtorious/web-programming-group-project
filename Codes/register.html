<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header>
    <a href="index.html" class="logo">I-ppliance</a>

    <div class="mobile-nav-button" id="mobile-card">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <nav>
      <a href="login.html">Login</a>
      <a href="register.html">Registration</a>
      <a href="index.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <section class="user-section">
      <div class="user-card">
        <h2>Register</h2>

        <form id="register-form">
          <div class="form-group">
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" placeholder="Enter your first name" required />
          </div>

          <div class="form-group">
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" placeholder="Enter your last name" required />
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required />
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="">Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="e.g. 876-123-4567" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required />
          </div>

          <div class="form-group">
            <label for="trn">TRN</label>
            <input
              type="text"
              id="trn"
              placeholder="000-000-000"
              maxlength="11"
              required
            />
          </div>

          <div class="form-group">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              placeholder="Create a password"
              minlength="8"
              required
            />
          </div>

          <div class="form-group">
            <label for="reg-cpassword">Confirm Password</label>
            <input
              type="password"
              id="reg-cpassword"
              placeholder="Confirm your password"
              minlength="8"
              required
            />
          </div>

          <p id="register-message"></p>

          <div class="form-actions">
            <button type="submit" class="btn" id="registerbtn">Register</button>
            <button type="reset" class="btn cancel-btn" id="cancelbtn">Cancel</button>
          </div>

          <p>Already have an account? <a href="login.html">Log in here</a></p>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 John-Mark Whittick | Tyrise Baker | CIT2011 IA#2</p>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
