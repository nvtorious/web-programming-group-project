<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | I-ppliance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .cart-page-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 5%;
        }

        .cart-page-title {
            font-size: 2rem;
            color: var(--primary-dark-grey);
            margin-bottom: 10px;
        }

        .cart-page-subtitle {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-cart h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: #888;
            margin-bottom: 25px;
        }

        .empty-cart .btn {
            width: auto;
            display: inline-block;
            padding: 12px 30px;
        }

        .cart-items-box {
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 25px;
        }

        .cart-items-header {
            display: grid;
            grid-template-columns: 80px 1fr 130px 130px 130px 90px;
            gap: 10px;
            padding: 15px 25px;
            background: var(--primary-dark-grey);
            color: var(--white);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cart-items-header span:not(:first-child) {
            text-align: center;
        }

        .cart-row {
            display: grid;
            grid-template-columns: 80px 1fr 130px 130px 130px 90px;
            gap: 10px;
            padding: 18px 25px;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .cart-row:last-child { border-bottom: none; }
        .cart-row:hover { background: #fafafa; }

        .cart-row img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 8px;
            background: #f9f9f9;
            padding: 5px;
        }

        .cart-row .item-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .cart-row .item-price {
            font-size: 0.9rem;
            color: #888;
            margin-top: 3px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: 2px solid var(--primary-dark-grey);
            background: transparent;
            color: var(--primary-dark-grey);
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
            padding: 0;
        }

        .qty-btn:hover {
            background: var(--primary-dark-grey);
            color: var(--white);
        }

        .qty-display {
            min-width: 28px;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
        }

        .cart-col-center { text-align: center; }

        .item-subtotal {
            font-weight: 700;
            color: var(--primary-dark-grey);
            text-align: center;
        }

        .remove-item-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border: none;
            background: #fff0f0;
            color: var(--error-red);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            margin: 0 auto;
        }

        .remove-item-btn:hover {
            background: var(--error-red);
            color: var(--white);
        }

        .cart-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .cart-actions-left, .cart-actions-right {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .cart-actions .btn {
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            margin-top: 0;
            font-size: 0.9rem;
        }

        .btn-outline {
            background: transparent !important;
            border: 2px solid var(--primary-dark-grey) !important;
            color: var(--primary-dark-grey) !important;
        }

        .btn-outline:hover {
            background: var(--primary-dark-grey) !important;
            color: var(--white) !important;
        }

        .btn-danger { background: var(--error-red) !important; }

        .btn-danger:hover {
            background: #b94040 !important;
            box-shadow: 0 8px 20px rgba(217,83,79,0.3) !important;
        }

        .cart-summary-card {
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
        }

        .cart-summary-card h3 {
            font-size: 1.2rem;
            color: var(--primary-dark-grey);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.95rem;
        }

        .summary-row.discount { color: #2e9e5b; font-weight: 600; }
        .summary-row.tax { color: #888; }

        .summary-divider {
            border: none;
            border-top: 2px solid #f0f0f0;
            margin: 12px 0;
        }

        .summary-row.grand-total {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-dark-grey);
            padding-top: 5px;
        }

        .promo-badge {
            display: inline-block;
            background: #e8f8ef;
            color: #2e9e5b;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .promo-progress { margin: 12px 0 18px 0; }

        .promo-progress-label {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 6px;
        }

        .promo-bar-bg {
            background: #f0f0f0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .promo-bar-fill {
            background: var(--accent-gold);
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .summary-checkout-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            font-size: 1rem;
        }

        .summary-continue-link {
            display: block;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-top: 12px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .summary-continue-link:hover { color: var(--primary-dark-grey); }

        @media screen and (max-width: 768px) {
            .cart-items-header { display: none; }

            .cart-row {
                grid-template-columns: 70px 1fr;
                grid-template-rows: auto auto auto;
                gap: 8px;
                padding: 15px;
                position: relative;
            }

            .cart-row img { grid-row: 1 / 3; width: 65px; height: 65px; }
            .cart-row .item-info { grid-column: 2; }

            .cart-col-center { text-align: left; }

            .remove-item-btn {
                position: absolute;
                top: 15px;
                right: 15px;
                margin: 0;
            }

            .cart-actions { flex-direction: column; }
            .cart-actions-left, .cart-actions-right { width: 100%; }
            .cart-actions .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">I-ppliance</a>

        <div class="mobile-nav-button" id="mobile-card">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <nav>
            <a href="login.html">Login</a>
            <a href="register.html">Registration</a>
            <a href="index.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main>
        <div class="cart-page-wrapper">
            <h1 class="cart-page-title">Shopping Cart</h1>
            <p class="cart-page-subtitle">Review your selected items before checkout.</p>
            <div id="cart-container"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 I-ppliance | CIT2011 Group Project</p>
    </footer>

    <script src="../script.js"></script>
</body>

</html>
